const AnimSec = ({children,cls="",delay=0}) => {
  const ref=useRef(null);const[v,sv]=useState(false);
  useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setTimeout(()=>sv(true),delay)},{threshold:0.1,rootMargin:"50px"});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[delay]);
  return <div ref={ref} style={{transition:"opacity 1s ease,transform 1s ease",opacity:v?1:0,transform:v?"translateY(0)":"translateY(48px)"}} className={cls}>{children}</div>;
};
 
const Slider = ({children,cols=""}) => {
  const ref=useRef(null);const[cL,scL]=useState(false);const[cR,scR]=useState(true);
  const chk=()=>{if(ref.current){const{scrollLeft:sl,scrollWidth:sw,clientWidth:cw}=ref.current;scL(sl>0);scR(sl<sw-cw-10);}};
  useEffect(()=>{const el=ref.current;if(el){el.addEventListener("scroll",chk);chk();return()=>el.removeEventListener("scroll",chk);}},[]);
  const sc=d=>ref.current&&ref.current.scrollBy({left:d==="l"?-ref.current.clientWidth*.8:ref.current.clientWidth*.8,behavior:"smooth"});
  return(
    <div className="relative">
      {cL&&<button onClick={()=>sc("l")} style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",zIndex:10,width:40,height:40,background:"rgba(0,0,0,.9)",border:"1px solid rgba(255,255,255,.1)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}} className="md:hidden"><Ic n="ChevLeft" size={18} cls="text-white"/></button>}

      <div ref={ref} className={"flex md:grid gap-4 overflow-x-auto md:overflow-visible pb-4 md:pb-0 -mx-6 px-6 md:mx-0 md:px-0 "+cols} style={{scrollbarWidth:"none",scrollSnapType:"x mandatory"}}>{children}</div>

};
